name: Supabase Keepalive

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "Missing required GitHub Actions secrets: SUPABASE_URL and/or SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Ping Supabase REST endpoint
        shell: bash
        run: |
          set -euo pipefail

          base_url="${SUPABASE_URL%/}"
          base_url="${base_url%/rest/v1}"
          endpoint="${base_url}/rest/v1/prompts?select=id&limit=1"
          response_file="$(mktemp)"

          http_code="$(
            curl \
              --silent \
              --show-error \
              --location \
              --output "$response_file" \
              --write-out "%{http_code}" \
              --retry 3 \
              --retry-delay 5 \
              --retry-connrefused \
              --connect-timeout 10 \
              --max-time 25 \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
              --header "Accept: application/json" \
              "$endpoint"
          )"

          if [ "$http_code" != "200" ]; then
            echo "Supabase keepalive failed with HTTP ${http_code}"
            cat "$response_file"
            exit 1
          fi

          echo "Supabase keepalive succeeded"
